services:
  # Web Service
  - type: web
    name: safari-tours
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "true"
      - key: APP_KEY
        value: base64:tudfUn3M6MOMxcuO3ojb294hWwtARa55a5uD2nblowM=
      - key: APP_URL
        value: https://safari-tours-fpiu.onrender.com
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: debug
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: safari-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: safari-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: safari-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: safari-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: safari-db
          property: password
      - key: CACHE_STORE
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.mailtrap.io
      - key: MAIL_PORT
        value: "2525"
      - key: MAIL_USERNAME
        value: your_mailtrap_username
      - key: MAIL_PASSWORD
        value: your_mailtrap_password
      - key: MAIL_ENCRYPTION
        value: tls
      - key: MAIL_FROM_ADDRESS
        value: noreply@safaritours.com
      - key: MAIL_FROM_NAME
        value: "Safari Tours"
      - key: SANCTUM_STATEFUL_DOMAINS
        value: safari-tours-fpiu.onrender.com

# PostgreSQL Database
databases:
  - name: safari-db
    databaseName: safari_tours
    user: safari_user